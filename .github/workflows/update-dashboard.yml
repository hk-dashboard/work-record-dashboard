name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth google-auth-oauthlib google-auth-httplib2

      - name: Create Google service account file
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          cat > service_account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Update dashboard from Google Sheets
        run: |
          python <<'PY'
          import json
          import re
          from datetime import datetime
          import gspread
          from google.oauth2.service_account import Credentials

          SPREADSHEET_NAME = "Work Record"
          OUTPUT_FILE = "index.html"
          YEAR_SHEETS = [str(y) for y in range(2023, 2031)]

          SCOPES = [
              "https://www.googleapis.com/auth/spreadsheets.readonly",
              "https://www.googleapis.com/auth/drive.readonly",
          ]

          creds = Credentials.from_service_account_file(
              "service_account.json",
              scopes=SCOPES
          )

          gc = gspread.authorize(creds)
          sh = gc.open(SPREADSHEET_NAME)

          def clean_int(value):
              if value is None:
                  return 0

              s = str(value).strip()

              if s == "":
                  return 0

              s = s.replace(",", "")

              try:
                  return int(float(s))
              except Exception:
                  return 0

          def normalize_date(value, fallback_year):
              s = str(value).strip()

              if not s:
                  return None

              for fmt in (
                  "%Y/%m/%d",
                  "%Y-%m-%d",
                  "%m/%d/%Y",
                  "%m-%d-%Y",
                  "%m/%d/%y",
                  "%m-%d-%y",
              ):
                  try:
                      dt = datetime.strptime(s, fmt)
                      return dt.strftime("%Y/%m/%d")
                  except Exception:
                      pass

              s2 = s.replace("-", "/")
              parts = [p.strip() for p in s2.split("/")]

              if len(parts) == 2:
                  mm, dd = parts
                  return f"{fallback_year}/{mm.zfill(2)}/{dd.zfill(2)}"

              return None

          rows = []

          for sheet_name in YEAR_SHEETS:
              try:
                  ws = sh.worksheet(sheet_name)
              except gspread.exceptions.WorksheetNotFound:
                  continue

              values = ws.get_all_values()

              if not values or len(values) < 2:
                  continue

              headers = values[0]
              data_rows = values[1:]

              for row in data_rows:
                  padded_row = row + [""] * (len(headers) - len(row))
                  record = dict(zip(headers, padded_row))

                  pj_name = str(record.get("PJ Name", "")).strip()
                  role = str(record.get("Role", "")).strip()
                  category = str(record.get("Category", "")).strip()
                  work_file_raw = str(record.get("Work File", "")).strip()
                  words_raw = str(record.get("Word Amount", "")).strip()
                  offered_raw = str(record.get("Offered Date", "")).strip()
                  start_raw = str(record.get("Start Date", "")).strip()
                  completion_raw = str(record.get("Completion Date", "")).strip()

                  completion_date = normalize_date(completion_raw, sheet_name)
                  if not completion_date:
                      continue

                  offered_date = normalize_date(offered_raw, sheet_name) or completion_date
                  start_date = normalize_date(start_raw, sheet_name) or completion_date

                  work_files = [x.strip() for x in work_file_raw.split("\n") if x.strip()]

                  rows.append({
                      "pjName": pj_name,
                      "role": role,
                      "category": category,
                      "workFile": work_file_raw,
                      "words": clean_int(words_raw),
                      "offeredDate": offered_date,
                      "startDate": start_date,
                      "completionDate": completion_date,
                      "workFiles": work_files
                  })

          rows = sorted(rows, key=lambda x: x["completionDate"], reverse=True)

          with open(OUTPUT_FILE, "r", encoding="utf-8") as f:
              html = f.read()

          js_rows = json.dumps(rows, ensure_ascii=False)

          new_html, count = re.subn(
              r"const rows = \[.*?\];",
              f"const rows = {js_rows};",
              html,
              count=1,
              flags=re.S
          )

          if count == 0:
              raise RuntimeError("const rows = [...] not found in index.html")

          with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
              f.write(new_html)

          print(f"Updated index.html with {len(rows)} rows.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "auto update dashboard"

      - name: Push changes
        run: |
          git push origin HEAD:main
