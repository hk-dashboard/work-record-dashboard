name: update dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v4


    - name: install packages
      run: |

        pip install pandas requests


    - name: generate html
      run: |

        python << 'EOF'

        import pandas as pd
        import requests
        import re
        import json

        SPREADSHEET_ID="1mlDbm671wECDDF9RW0-_MN2SVc8pdMm6GTizK6DrBKo"

        # ------------------------
        # get all sheet gids
        # ------------------------

        url=f"https://docs.google.com/spreadsheets/d/{SPREADSHEET_ID}"

        html=requests.get(url).text

        gids=set(re.findall(r'"gid":(\d+)',html))

        dfs=[]

        for gid in gids:

            csv_url=f"https://docs.google.com/spreadsheets/d/{SPREADSHEET_ID}/export?format=csv&gid={gid}"

            try:

                df=pd.read_csv(csv_url)

                if len(df)>0:

                    df["sheet"]=gid

                    dfs.append(df)

            except:

                pass


        df=pd.concat(dfs,ignore_index=True)

        # ------------------------
        # normalize columns
        # ------------------------

        df.columns=[c.strip() for c in df.columns]

        columns=[

            "PJ Name",
            "Role",
            "Category",
            "Work File",
            "Word Amount",
            "Offered Date",
            "Start Date",
            "Completion Date"

        ]

        df=df[columns]

        rows=[]

        for _,r in df.iterrows():

            rows.append({

                "pjName":r["PJ Name"],

                "role":r["Role"],

                "category":r["Category"],

                "workFile":r["Work File"],

                "words":int(r["Word Amount"]),

                "offeredDate":r["Offered Date"],

                "startDate":r["Start Date"],

                "completionDate":r["Completion Date"],

                "workFiles":[

                    x.strip()

                    for x in str(r["Work File"]).split("\n")

                ]

            })


        # ------------------------
        # inject into template
        # ------------------------

        with open("work_record_dashboard_v10.html","r") as f:

            template=f.read()


        html=template.replace(

            "const rows = [];",

            "const rows = "+json.dumps(rows,ensure_ascii=False)+";"

        )


        with open("index.html","w") as f:

            f.write(html)

        EOF


    - name: commit
      run: |

        git config user.name github-actions

        git config user.email actions@github.com

        git add index.html

        git commit -m "auto update dashboard" || echo "no changes"

        git push
