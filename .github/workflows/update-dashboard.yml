name: update dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install packages
        run: pip install pandas requests

      - name: generate html
        run: |
          python << 'EOF'
          import json
          import pandas as pd

          SHEET_URL = "https://docs.google.com/spreadsheets/d/1mlDbm671wECDDF9RW0-_MN2SVc8pdMm6GTizK6DrBKo/edit?gid=1629472964#gid=1629472964"

          sheet_id = SHEET_URL.split("/d/")[1].split("/")[0]

          if "gid=" in SHEET_URL:
              gid_part = SHEET_URL.split("gid=")[1]
              gid = gid_part.split("#")[0].split("&")[0]
          else:
              gid = "0"

          csv_url = f"https://docs.google.com/spreadsheets/d/{sheet_id}/export?format=csv&gid={gid}"
          print("CSV URL:", csv_url)

          df = pd.read_csv(csv_url)
          print("columns:", df.columns.tolist())

          # 列名をColab版に合わせる
          df = df.rename(columns={
              "PJ Name": "pjName",
              "Role": "role",
              "Category": "category",
              "Work File": "workFile",
              "Word Amount": "words",
              "Offered Date": "offeredDate",
              "Start Date": "startDate",
              "Completion Date": "completionDate",
          })

          # words を数値化
          df["words"] = (
              df["words"]
              .astype(str)
              .str.replace(",", "", regex=False)
              .str.strip()
          )
          df["words"] = pd.to_numeric(df["words"], errors="coerce").fillna(0)

          # workFiles 作成
          df["workFiles"] = df["workFile"].fillna("").astype(str).apply(
              lambda x: [f.strip() for f in x.split("\n") if f.strip()]
          )

          rows_dashboard = df.to_dict(orient="records")

          rows_json = json.dumps(rows_dashboard, ensure_ascii=False)
          rows_json = rows_json.replace("\r\n", "\\n").replace("\n", "\\n").replace("\r", "\\n")

          with open("work_record_dashboard_v10.html", "r", encoding="utf-8") as f:
              template_html = f.read()

          html = template_html.replace("const rows = [];", f"const rows = {rows_json};")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("index.html generated from template")
          EOF

      - name: commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add index.html
          git commit -m "auto update dashboard" || echo "no changes"
          git push
