name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth google-auth-oauthlib google-auth-httplib2

      - name: Create Google service account file
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          cat > service_account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Update dashboard from Google Sheets
        run: |
          python <<'PY'
          import json
          import re
          from datetime import datetime, date

          import gspread
          from google.oauth2.service_account import Credentials

          SPREADSHEET_NAME = "Work Record"
          OUTPUT_FILE = "index.html"
          YEAR_SHEETS = [str(y) for y in range(2023, 2031)]

          SCOPES = [
              "https://www.googleapis.com/auth/spreadsheets.readonly",
              "https://www.googleapis.com/auth/drive.readonly",
          ]

          ROLE_MAP = {
              "Review": "Proofreading",
              "Proofreading": "Proofreading",
              "Translation": "Translation",
              "MTPE": "MTPE",
              "LQA": "LQA",
          }

          def clean_int(value):
              if value is None:
                  return 0

              s = str(value).strip()

              if s == "":
                  return 0

              s = s.replace(",", "")

              try:
                  return int(float(s))
              except Exception:
                  return 0

          def normalize_date(value, fallback_year):
              if value is None:
                  return ""

              if isinstance(value, datetime):
                  return value.strftime("%Y-%m-%d")

              if isinstance(value, date):
                  return value.strftime("%Y-%m-%d")

              s = str(value).strip()

              if s == "":
                  return ""

              for fmt in (
                  "%Y-%m-%d",
                  "%Y/%m/%d",
                  "%m/%d/%Y",
                  "%m-%d-%Y",
                  "%m/%d/%y",
                  "%m-%d-%y",
              ):
                  try:
                      return datetime.strptime(s, fmt).strftime("%Y-%m-%d")
                  except Exception:
                      pass

              s2 = s.replace("/", "-")
              parts = [p.strip() for p in s2.split("-") if p.strip()]

              if len(parts) == 2:
                  mm, dd = parts
                  return f"{fallback_year}-{mm.zfill(2)}-{dd.zfill(2)}"

              return ""

          creds = Credentials.from_service_account_file(
              "service_account.json",
              scopes=SCOPES
          )

          gc = gspread.authorize(creds)
          sh = gc.open(SPREADSHEET_NAME)

          rows = []

          for sheet_name in YEAR_SHEETS:
              try:
                  ws = sh.worksheet(sheet_name)
              except gspread.exceptions.WorksheetNotFound:
                  continue

              values = ws.get_all_values()

              if not values or len(values) < 2:
                  continue

              headers = values[0]
              data_rows = values[1:]

              for row in data_rows:
                  padded_row = row + [""] * (len(headers) - len(row))
                  record = dict(zip(headers, padded_row))

                  pj_name = str(record.get("PJ Name", "")).strip()
                  role_raw = str(record.get("Role", "")).strip()
                  category_raw = str(record.get("Category", "")).strip()
                  work_file_raw = str(record.get("Work File", "")).strip()
                  words_raw = record.get("Word Amount", "")
                  offered_raw = record.get("Offered Date", "")
                  start_raw = record.get("Start Date", "")
                  completion_raw = record.get("Completion Date", "")

                  completion_date = normalize_date(completion_raw, sheet_name)

                  if completion_date == "":
                      continue

                  offered_date = normalize_date(offered_raw, sheet_name) or completion_date
                  start_date = normalize_date(start_raw, sheet_name) or completion_date

                  work_files = [
                      x.strip()
                      for x in work_file_raw.splitlines()
                      if str(x).strip()
                  ]

                  work_file_joined = " ".join(work_files) if work_files else ""

                  rows.append({
                      "sheet": sheet_name,
                      "pjName": pj_name,
                      "role": ROLE_MAP.get(role_raw, role_raw if role_raw else "Other"),
                      "roleRaw": role_raw,
                      "category": category_raw.replace("\n", " ").strip(),
                      "workFile": work_file_joined,
                      "workFiles": work_files,
                      "words": clean_int(words_raw),
                      "offeredDate": offered_date,
                      "startDate": start_date,
                      "completionDate": completion_date,
                      "sortDate": completion_date
                  })

          rows = sorted(
              rows,
              key=lambda r: (
                  r.get("sortDate", ""),
                  r.get("words", 0),
                  r.get("pjName", "")
              ),
              reverse=True
          )

          js_rows = json.dumps(rows, ensure_ascii=False)

          with open(OUTPUT_FILE, "r", encoding="utf-8") as f:
              html = f.read()

          pattern = r"const rows = \[.*?\];"

          def replacement(_match):
              return f"const rows = {js_rows};"

          new_html, count = re.subn(
              pattern,
              replacement,
              html,
              count=1,
              flags=re.S
          )

          if count == 0:
              raise RuntimeError("const rows = [...] not found in index.html")

          with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
              f.write(new_html)

          print(f"Updated index.html with {len(rows)} rows.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "auto update dashboard"

      - name: Push changes
        run: |
          git push origin HEAD:main
