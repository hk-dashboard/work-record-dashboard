name: update dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v4


    - name: install packages
      run: |
        pip install pandas


    - name: generate html
      run: |

        python << 'EOF'

        import pandas as pd
        import json

        SPREADSHEET_ID = "1mlDbm671wECDDF9RW0-_MN2SVc8pdMm6GTizK6DrBKo"

        YEARS = range(2023, 2035)

        dfs = []

        for y in YEARS:

            url = f"https://docs.google.com/spreadsheets/d/{SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet={y}"

            try:

                df = pd.read_csv(url)

                if len(df) > 0:

                    df["sheet"] = str(y)

                    dfs.append(df)

                    print(f"loaded sheet {y}")

            except:

                print(f"skip {y}")


        if len(dfs) == 0:

            raise Exception("No sheet data found")


        df = pd.concat(dfs, ignore_index=True)

        df.columns = [c.strip() for c in df.columns]


        columns = [

            "PJ Name",
            "Role",
            "Category",
            "Work File",
            "Word Amount",
            "Offered Date",
            "Start Date",
            "Completion Date"

        ]

        df = df[columns]


        rows = []

        for _, r in df.iterrows():

            words = int(str(r["Word Amount"]).replace(",",""))

            rows.append({

                "pjName": r["PJ Name"],

                "role": r["Role"],

                "category": r["Category"],

                "workFile": r["Work File"],

                "words": words,

                "offeredDate": r["Offered Date"],

                "startDate": r["Start Date"],

                "completionDate": r["Completion Date"],

                "workFiles": [

                    x.strip()

                    for x in str(r["Work File"]).split("\n")

                ]

            })


        with open("work_record_dashboard_v10.html") as f:

            template = f.read()


        html = template.replace(

            "const rows = [];",

            "const rows = " + json.dumps(rows, ensure_ascii=False) + ";"

        )


        with open("index.html", "w") as f:

            f.write(html)


        print(f"{len(rows)} rows written")


        EOF


    - name: commit
      run: |

        git config user.name github-actions

        git config user.email actions@github.com

        git add index.html

        git commit -m "auto update dashboard" || echo "no changes"

        git push
