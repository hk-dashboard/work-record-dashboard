name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth google-auth-oauthlib google-auth-httplib2

      - name: Create Google service account file
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Update dashboard from Google Sheets
        run: |
          python <<'PY'
          import re
          import json
          import gspread
          from google.oauth2.service_account import Credentials

          SPREADSHEET_NAME = "Work Record"
          OUTPUT_FILE = "index.html"
          YEAR_SHEETS = [str(y) for y in range(2023, 2031)]

          SCOPES = [
              "https://www.googleapis.com/auth/spreadsheets.readonly",
              "https://www.googleapis.com/auth/drive.readonly",
          ]

          creds = Credentials.from_service_account_file(
              "service_account.json",
              scopes=SCOPES
          )

          gc = gspread.authorize(creds)
          sh = gc.open(SPREADSHEET_NAME)

          def clean_int(value):
              if value is None:
                  return 0
              s = str(value).strip()
              if s == "":
                  return 0
              s = s.replace(",", "")
              return int(float(s))

          def normalize_date(sheet_year, date_raw):
              if not date_raw:
                  return None

              d = str(date_raw).strip().replace("-", "/")
              parts = d.split("/")

              if len(parts) == 3:
                  if len(parts[0]) == 4:
                      y, m, day = parts[0], parts[1], parts[2]
                  else:
                      m, day, y = parts[0], parts[1], parts[2]
                  return f"{y}/{m.zfill(2)}/{day.zfill(2)}"

              if len(parts) == 2:
                  m, day = parts[0], parts[1]
                  return f"{sheet_year}/{m.zfill(2)}/{day.zfill(2)}"

              return None

          all_rows = []

          for sheet_name in YEAR_SHEETS:
              try:
                  ws = sh.worksheet(sheet_name)
              except gspread.exceptions.WorksheetNotFound:
                  continue

              values = ws.get_all_values()
              if not values or len(values) < 2:
                  continue

              headers = values[0]
              data_rows = values[1:]

              for row in data_rows:
                  record = dict(zip(headers, row + [""] * (len(headers) - len(row))))

                  completion_date = normalize_date(sheet_name, record.get("Date", ""))
                  if not completion_date:
                      continue

                  word_amount_raw = record.get("Word Amount", "").strip()
                  work_file_raw = record.get("Work File", "").strip()
                  project = record.get("Project", "").strip()
                  category = record.get("Category", "").strip()

                  try:
                      words = clean_int(word_amount_raw)
                  except Exception:
                      words = 0

                  work_files = [x.strip() for x in work_file_raw.split("\n") if x.strip()]

                  all_rows.append({
                      "pjName": project,
                      "role": "",
                      "category": category,
                      "workFile": work_file_raw,
                      "words": words,
                      "offeredDate": completion_date,
                      "startDate": completion_date,
                      "completionDate": completion_date,
                      "workFiles": work_files
                  })

          all_rows = sorted(
              all_rows,
              key=lambda x: x["completionDate"],
              reverse=True
          )

          js_rows = json.dumps(all_rows, ensure_ascii=False)

          with open(OUTPUT_FILE, "r", encoding="utf-8") as f:
              html = f.read()

          new_html, count = re.subn(
              r"const rows = \[.*?\];",
              f"const rows = {js_rows};",
              html,
              count=1,
              flags=re.S
          )

          if count == 0:
              raise RuntimeError("const rows = [...] が見つかりません")

          with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
              f.write(new_html)

          print(f"Updated {OUTPUT_FILE} with {len(all_rows)} rows.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "auto update dashboard"

      - name: Push changes
        run: |
          git push origin HEAD:main
