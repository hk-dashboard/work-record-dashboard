<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Record Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
margin:0;
padding:40px;
background:#f5f7fb;
color:#1f2937;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:20px;
}

.metric{
font-size:36px;
font-weight:700;
}

.label{
font-size:12px;
letter-spacing:1px;
color:#6b7280;
margin-bottom:10px;
}

canvas{
width:100% !important;
height:300px !important;
}

select{
padding:6px 10px;
border-radius:8px;
border:1px solid #d1d5db;
}
</style>

</head>

<body>

<h1>Work Record Dashboard</h1>

<div class="card">
Year
<select id="yearFilter"></select>
</div>

<div class="grid">

<div class="card">
<div class="label">TOTAL RECORDS</div>
<div class="metric" id="totalRecords">0</div>
<div id="uniqueProjects"></div>
</div>

<div class="card">
<div class="label">TOTAL WORDS</div>
<div class="metric" id="totalWords">0</div>
</div>

<div class="card">
<div class="label">MONTHLY AVG WORDS</div>
<div class="metric" id="monthlyAvg">0</div>
</div>

<div class="card">
<div class="label">TOTAL FILES</div>
<div class="metric" id="totalFiles">0</div>
</div>

</div>

<div class="grid">

<div class="card">
<h3>Yearly Volume</h3>
<canvas id="yearChart"></canvas>
</div>

<div class="card">
<h3>Category Breakdown</h3>
<canvas id="catChart"></canvas>
</div>

</div>

<script>

const rows = [];

function init(){

const years = [...new Set(rows.map(r=>r.completionDate.slice(0,4)))]

const select=document.getElementById("yearFilter")

select.innerHTML="<option value='all'>All</option>"

years.sort().forEach(y=>{
select.innerHTML+=`<option value="${y}">${y}</option>`
})

select.onchange=update

update()

}

function update(){

const y=document.getElementById("yearFilter").value

const data=y==="all"
?rows
:rows.filter(r=>r.completionDate.startsWith(y))

document.getElementById("totalRecords").innerText=data.length

document.getElementById("uniqueProjects").innerText=
[...new Set(data.map(r=>r.pjName))].length+" unique projects"

document.getElementById("totalWords").innerText=
data.reduce((a,b)=>a+b.words,0).toLocaleString()

document.getElementById("monthlyAvg").innerText=
Math.round(
data.reduce((a,b)=>a+b.words,0)/12
).toLocaleString()

document.getElementById("totalFiles").innerText=
data.reduce((a,b)=>a+b.workFiles.length,0)

drawYear(data)

drawCat(data)

}

function drawYear(data){

const byYear={}

data.forEach(r=>{
const y=r.completionDate.slice(0,4)
byYear[y]=(byYear[y]||0)+r.words
})

new Chart(
document.getElementById("yearChart"),
{
type:"bar",
data:{
labels:Object.keys(byYear),
datasets:[{
label:"Words",
data:Object.values(byYear)
}]
}
}
)

}

function drawCat(data){

const byCat={}

data.forEach(r=>{
const c=r.category||"Other"
byCat[c]=(byCat[c]||0)+r.words
})

new Chart(
document.getElementById("catChart"),
{
type:"doughnut",
data:{
labels:Object.keys(byCat),
datasets:[{
data:Object.values(byCat)
}]
}
}
)

}

init()

</script>

</body>
</html>
