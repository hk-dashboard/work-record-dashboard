<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work Record Dashboard</title>

<style>

:root{
  --bg:#f8fafc;
  --bg2:#eef4f8;
  --panel:rgba(255,255,255,.97);
  --line:#dbe4ee;
  --text:#1f2937;
  --muted:#667085;
  --accent:#3b82f6;
  --shadow:0 18px 40px rgba(15,23,42,.06);
  --radius:24px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.06), transparent 24%),
    linear-gradient(180deg,#ffffff 0%,var(--bg) 55%,var(--bg2) 100%);
}

.container{
  width:min(1320px, calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 56px;
}

/* sticky解除 */
.hero{
  position:relative;
  padding:4px 0 18px;
}

.surface{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--shadow);
}

.hero-card{
  padding:22px 24px;
}

.identity{
  font-size:.9rem;
  color:var(--muted);
  margin-bottom:6px;
  line-height:1.4;
}

.identity strong{
  display:block;
  font-size:1rem;
  color:var(--text);
}

h1{
  margin:0;
  font-size:clamp(1.75rem,2.5vw,2.55rem);
  letter-spacing:-.03em;
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.year-btn{
  border:1px solid #d8e1ef;
  background:#fff;
  color:#475569;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:.95rem;
  cursor:pointer;
  transition:.2s ease;
}

.year-btn:hover{
  transform:translateY(-1px);
  border-color:#bfd1ef;
}

.year-btn.active{
  background:linear-gradient(180deg,#4f8cff,#3b82f6);
  border-color:#3b82f6;
  color:#fff;
}

.section{
  margin-top:20px;
}

.grid{
  display:grid;
  gap:18px;
}

.kpis{
  grid-template-columns:repeat(4,minmax(0,1fr));
}

.kpi{
  padding:22px;
}

.kpi-label{
  font-size:.8rem;
  color:var(--muted);
}

.kpi-value{
  font-size:1.6rem;
  font-weight:700;
  margin-top:4px;
}

.kpi-sub{
  font-size:.75rem;
  color:var(--muted);
  margin-top:6px;
}

/* back to top */

#backToTop{
  position:fixed;
  bottom:24px;
  right:24px;
  width:44px;
  height:44px;
  border-radius:999px;
  border:none;
  background:linear-gradient(180deg,#4f8cff,#3b82f6);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 12px 24px rgba(59,130,246,.35);
  display:none;
}

#backToTop:hover{
  transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

<header class="hero">

<div class="surface hero-card">

<div class="identity">
<strong>Hiroshi Kanemitsu</strong>
Freelance Translator / Linguist
</div>

<h1>Work Record Dashboard</h1>

<div class="button-row">
<select id="yearSelect" class="year-btn"></select>
</div>

</div>

</header>

<section class="section grid kpis" id="kpiGrid"></section>

<section class="section surface" style="padding:24px">
<h2 id="volumeTitle">Volume</h2>
<div id="volumeSub"></div>
<div id="volumeChart"></div>
</section>

<section class="section surface" style="padding:24px">
<h2>Category Breakdown</h2>
<div id="categoryBreakdown"></div>
</section>

<section class="section" id="projects"></section>

</div>

<button id="backToTop">↑</button>

<script>

/* 既存JSそのまま */

const backBtn = document.getElementById("backToTop");

window.addEventListener("scroll",()=>{
  backBtn.style.display = window.scrollY > 300 ? "block" : "none";
});

backBtn.addEventListener("click",()=>{
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
});

</script>

</body>
</html>
