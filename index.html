<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Record Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f3f6fb;
      color: #1f2937;
    }

    h1 {
      font-size: 32px;
      margin: 0 0 24px 0;
      font-weight: 800;
    }

    .card {
      background: #fff;
      border: 1px solid #d9e2ef;
      border-radius: 24px;
      padding: 24px 28px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.06);
      margin-bottom: 20px;
    }

    .filter-card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 110px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 20px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 1.6px;
      color: #667085;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .metric {
      font-size: 44px;
      line-height: 1;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .subtext {
      font-size: 16px;
      color: #667085;
    }

    .chart-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 16px 0;
      color: #1f2937;
    }

    select {
      appearance: auto;
      padding: 10px 14px;
      border-radius: 14px;
      border: 2px solid #3b82f6;
      background: #fff;
      font-size: 16px;
      color: #1f2937;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
    }

    @media (max-width: 1100px) {
      .grid,
      .chart-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Work Record Dashboard</h1>

  <div class="card filter-card">
    <label for="yearFilter" style="font-size:16px;font-weight:600;">Year</label>
    <select id="yearFilter"></select>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">TOTAL RECORDS</div>
      <div class="metric" id="totalRecords">0</div>
      <div class="subtext" id="uniqueProjects">0 unique projects</div>
    </div>

    <div class="card">
      <div class="label">TOTAL WORDS</div>
      <div class="metric" id="totalWords">0</div>
    </div>

    <div class="card">
      <div class="label">MONTHLY AVG WORDS</div>
      <div class="metric" id="monthlyAvg">0</div>
    </div>

    <div class="card">
      <div class="label">TOTAL FILES</div>
      <div class="metric" id="totalFiles">0</div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="card">
      <h2 class="chart-title">Yearly Volume</h2>
      <div class="chart-wrap">
        <canvas id="yearChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2 class="chart-title">Category Breakdown</h2>
      <div class="chart-wrap">
        <canvas id="catChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const rows = [];

    console.log(rows.length);

    let yearChartInstance = null;
    let catChartInstance = null;

    function formatNumber(value) {
      return Number(value || 0).toLocaleString();
    }

    function getYears(data) {
      return [...new Set(
        data
          .map(r => (r.completionDate || "").slice(0, 4))
          .filter(Boolean)
      )].sort();
    }

    function buildYearFilter(data) {
      const select = document.getElementById("yearFilter");
      const years = getYears(data);

      select.innerHTML = `<option value="all">All</option>`;
      years.forEach(year => {
        select.innerHTML += `<option value="${year}">${year}</option>`;
      });

      select.value = "all";
      select.addEventListener("change", updateDashboard);
    }

    function getFilteredRows() {
      const selectedYear = document.getElementById("yearFilter").value;
      if (selectedYear === "all") return rows;
      return rows.filter(r => (r.completionDate || "").startsWith(selectedYear));
    }

    function updateSummary(data) {
      const totalRecords = data.length;
      const totalWords = data.reduce((sum, row) => sum + Number(row.words || 0), 0);
      const totalFiles = data.reduce((sum, row) => {
        const files = Array.isArray(row.workFiles) ? row.workFiles.length : 0;
        return sum + files;
      }, 0);
      const uniqueProjects = new Set(
        data.map(row => (row.pjName || "").trim()).filter(Boolean)
      ).size;

      const months = new Set(
        data.map(row => (row.completionDate || "").slice(0, 7)).filter(Boolean)
      ).size || 1;

      const monthlyAvg = Math.round(totalWords / months);

      document.getElementById("totalRecords").textContent = formatNumber(totalRecords);
      document.getElementById("totalWords").textContent = formatNumber(totalWords);
      document.getElementById("monthlyAvg").textContent = formatNumber(monthlyAvg);
      document.getElementById("totalFiles").textContent = formatNumber(totalFiles);
      document.getElementById("uniqueProjects").textContent = `${formatNumber(uniqueProjects)} unique projects`;
    }

    function drawYearChart(data) {
      const byYear = {};

      data.forEach(row => {
        const year = (row.completionDate || "").slice(0, 4);
        if (!year) return;
        byYear[year] = (byYear[year] || 0) + Number(row.words || 0);
      });

      const labels = Object.keys(byYear).sort();
      const values = labels.map(label => byYear[label]);

      if (yearChartInstance) yearChartInstance.destroy();

      yearChartInstance = new Chart(document.getElementById("yearChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "Words",
              data: values
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

    function drawCategoryChart(data) {
      const byCategory = {};

      data.forEach(row => {
        const category = (row.category || "").trim() || "Other";
        byCategory[category] = (byCategory[category] || 0) + Number(row.words || 0);
      });

      const labels = Object.keys(byCategory);
      const values = labels.map(label => byCategory[label]);

      if (catChartInstance) catChartInstance.destroy();

      catChartInstance = new Chart(document.getElementById("catChart"), {
        type: "doughnut",
        data: {
          labels,
          datasets: [
            {
              data: values
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

    function updateDashboard() {
      const filtered = getFilteredRows();
      updateSummary(filtered);
      drawYearChart(filtered);
      drawCategoryChart(filtered);
    }

    function init() {
      buildYearFilter(rows);
      updateDashboard();
    }

    init();
  </script>
</body>
</html>
