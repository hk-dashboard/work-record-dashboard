<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work Record Dashboard</title>
<style>
:root {
  --bg:#f8fafc;
  --bg2:#eef4f8;
  --panel:rgba(255,255,255,.97);
  --line:#dbe4ee;
  --text:#1f2937;
  --muted:#667085;
  --accent:#3b82f6;
  --shadow:0 18px 40px rgba(15,23,42,.06);
  --radius:24px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.06), transparent 24%),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 55%, var(--bg2) 100%);
}
.container { width:min(1320px, calc(100% - 32px)); margin:0 auto; padding:28px 0 56px; }
.hero {
  position:relative; top:auto; z-index:auto; padding:4px 0 18px;
  backdrop-filter:none;
  background:none;
}
.identity { margin-bottom:10px; }
.identity-name { font-size:clamp(1.15rem,1.8vw,1.35rem); font-weight:800; letter-spacing:-.02em; color:var(--text); line-height:1.2; }
.identity-role { margin-top:4px; color:var(--muted); font-size:clamp(.98rem,1.35vw,1.08rem); font-weight:500; line-height:1.35; }

.identity-contact{
  margin-top:14px;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  font-size:.92rem;
  line-height:1.6;
}
.email-row{
  position:relative;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:nowrap;
}
.contact-pill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-height:40px;
  padding:7px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.88);
  border:1px solid #dbe4ee;
  box-shadow:0 8px 20px rgba(15,23,42,.04);
}
.contact-icon{
  width:18px;
  height:18px;
  color:#475569;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}
.contact-icon svg{
  width:18px;
  height:18px;
}
.email-text{
  color:#334155;
  font-weight:600;
}
.copy-btn{
  appearance:none;
  border:1px solid #dbe4ee;
  background:#f8fafc;
  color:#475569;
  width:28px;
  height:28px;
  border-radius:10px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:0;
  transition:.15s ease;
  box-shadow:0 1px 2px rgba(15,23,42,.04);
}
.copy-btn:hover{
  background:#eef2f7;
  border-color:#cbd5e1;
  transform:translateY(-1px);
}
.copy-btn:active{
  transform:translateY(0);
}
.copy-btn svg{
  width:16px;
  height:16px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.9;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.copy-btn.copied{
  color:#2563eb;
  border-color:#bfdbfe;
  background:#eff6ff;
}
.copy-badge{
  position:absolute;
  left:calc(100% + 12px);
  top:50%;
  display:inline-flex;
  align-items:center;
  gap:12px;
  min-height:56px;
  padding:10px 20px 10px 14px;
  margin:0;
  border-radius:22px;
  border:1px solid rgba(203,213,225,.95);
  background:linear-gradient(135deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
  box-shadow:
    0 20px 40px rgba(59,130,246,.16),
    0 8px 20px rgba(15,23,42,.08);
  color:#0f172a;
  font-size:1rem;
  font-weight:800;
  letter-spacing:-.01em;
  opacity:0;
  transform:translateY(-50%) translateX(-6px) scale(.96);
  transform-origin:left center;
  transition:opacity .22s ease, transform .22s ease;
  pointer-events:none;
  white-space:nowrap;
  z-index:20;
}
.copy-badge::before{
  content:"";
  width:48px;
  height:48px;
  border-radius:999px;
  flex:0 0 auto;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 38%),
    linear-gradient(135deg, #67d4c5 0%, #56c6ba 100%);
  box-shadow:0 10px 22px rgba(86,198,186,.26);
}
.copy-badge::after{
  content:"";
  position:absolute;
  left:-10px;
  top:50%;
  width:20px;
  height:20px;
  background:linear-gradient(135deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
  border-left:1px solid rgba(203,213,225,.95);
  border-bottom:1px solid rgba(203,213,225,.95);
  transform:translateY(-50%) rotate(45deg);
  border-bottom-left-radius:6px;
}
.copy-badge .copy-badge-text{
  position:relative;
  z-index:1;
}
.copy-badge .copy-badge-check{
  position:absolute;
  left:29px;
  top:50%;
  width:18px;
  height:10px;
  border-left:4px solid #ffffff;
  border-bottom:4px solid #ffffff;
  transform:translateY(-62%) rotate(-45deg);
  z-index:2;
}
.copy-badge.show{
  opacity:1;
  transform:translateY(-50%) translateX(0) scale(1);
}
.contact-link{
  color:#2563eb;
  text-decoration:none;
  font-weight:700;
}
.contact-link:hover{
  text-decoration:none;
}
.linkedin-pill{
  color:#0f172a;
}
.linkedin-pill .contact-icon{
  color:#0a66c2;
}
.linkedin-pill .contact-text{
  color:#334155;
  font-weight:700;
}

.surface {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--shadow);
}
.hero-card {
  position:relative;
  overflow:hidden;
  padding:26px 32px;
  display:grid;
  grid-template-columns:minmax(0,1fr) max-content;
  gap:18px;
  align-items:center;
  isolation:isolate;
}
.hero-card::before{
  content:"";
  position:absolute;
  inset:-10% -8% auto auto;
  width:420px;
  height:240px;
  background:
    radial-gradient(circle at 30% 30%, rgba(59,130,246,.11), transparent 52%),
    radial-gradient(circle at 70% 70%, rgba(196,181,253,.10), transparent 48%);
  pointer-events:none;
  z-index:-2;
}
.hero-card::after{
  content:"";
  position:absolute;
  right:-40px;
  top:16px;
  width:360px;
  height:320px;
  background-image:radial-gradient(rgba(148,163,184,.18) 1px, transparent 1px);
  background-size:12px 12px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.7), transparent 88%);
  opacity:.55;
  pointer-events:none;
  z-index:-2;
}
.hero-main{
  position:relative;
  z-index:1;
}
.hero-title-wrap{
  margin-top:18px;
}
.hero-aside{
  position:relative;
  min-height:180px;
  display:grid;
  grid-template-columns:max-content max-content;
  grid-template-areas:
    "lang lang"
    "med mkt"
    "translation mtpe"
    "proofreading lqa";
  column-gap:12px;
  row-gap:10px;
  align-content:start;
  justify-content:end;
}
.hero-aside::before{
  content:"";
  position:absolute;
  inset:auto -36px -36px auto;
  width:420px;
  height:220px;
  border-radius:999px;
  background:
    linear-gradient(135deg, rgba(59,130,246,.08), rgba(255,255,255,0) 62%),
    linear-gradient(180deg, rgba(196,181,253,.10), rgba(255,255,255,0) 72%);
  transform:rotate(-8deg);
  pointer-events:none;
}
.hero-badges{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:max-content max-content;
  grid-template-areas:
    "lang lang"
    "med mkt"
    "translation mtpe"
    "proofreading lqa";
  column-gap:12px;
  row-gap:10px;
  justify-content:end;
  align-content:start;
  width:max-content;
  max-width:none;
  padding-top:12px;
}
.hero-badge{
  display:inline-flex; width:max-content; justify-self:start;
  align-items:center;
  min-height:42px;
  padding:9px 14px;
  border-radius:14px;
  border:1px solid rgba(219,228,238,.9);
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(8px);
  box-shadow:0 12px 30px rgba(15,23,42,.05);
  color:#334155;
  font-size:.95rem;
  font-weight:700;
  letter-spacing:-.01em;
}
.hero-badge.primary{
  background:linear-gradient(135deg, rgba(96,165,250,.78), rgba(196,181,253,.42));
  color:#ffffff;
  border-color:rgba(191,219,254,.92);
}
.hero-badge.secondary{
  background:rgba(224,242,242,.92); color:#0f766e; border-color:rgba(153,230,220,.95);
}
h1 { margin:0; font-size:clamp(1.75rem,2.5vw,2.55rem); letter-spacing:-.03em; }
.button-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.year-btn {
  border:1px solid #d8e1ef; background:#fff; color:#475569; padding:10px 16px; border-radius:999px;
  font-weight:700; font-size:.95rem; cursor:pointer; transition:.2s ease;
  box-shadow:0 4px 12px rgba(15,23,42,.03);
}
.year-btn:hover { transform:translateY(-1px); border-color:#bfd1ef; }
.year-btn.active {
  background:linear-gradient(180deg, #4f8cff, #3b82f6);
  border-color:#3b82f6; color:#fff; box-shadow:0 12px 22px rgba(59,130,246,.22);
}

.section { margin-top:20px; }
.grid { display:grid; gap:18px; }
.kpis { grid-template-columns:repeat(4,minmax(0,1fr)); }
.kpi { padding:22px 22px 18px; min-height:126px; display:flex; flex-direction:column; justify-content:space-between; }
.kpi-label { color:var(--muted); text-transform:uppercase; letter-spacing:.09em; font-size:.72rem; font-weight:800; }
.kpi-value { font-size:clamp(1.85rem,3vw,2.35rem); font-weight:800; letter-spacing:-.04em; margin-top:10px; }
.kpi-sub { color:var(--muted); font-size:.92rem; margin-top:4px; min-height:1.2em; }

.two-up { grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr); align-items:start; }
.panel { padding:22px; }
.panel h2 { margin:0 0 6px; font-size:1.08rem; letter-spacing:-.02em; }
.panel-sub { color:var(--muted); font-size:.93rem; margin-bottom:18px; }

.volume-list { display:grid; gap:12px; }
.volume-row { display:grid; grid-template-columns:64px minmax(0,1fr) 96px; gap:12px; align-items:center; }
.volume-label { font-size:.93rem; color:#475569; font-weight:700; }
.bar-track { position:relative; height:12px; background:#ecf2f8; border-radius:999px; overflow:hidden; }
.bar-fill { position:absolute; inset:0 auto 0 0; width:0%; border-radius:999px;
  background:linear-gradient(90deg, #93c5fd 0%, #60a5fa 40%, #3b82f6 100%); }
.volume-value { text-align:right; color:#475569; font-weight:700; font-variant-numeric:tabular-nums; font-size:.92rem; }

.breakdown-wrap { display:grid; gap:18px; }
.donut-row { display:grid; grid-template-columns:180px minmax(0,1fr); gap:20px; align-items:center; }
.donut {
  width:180px; height:180px; border-radius:50%;
  background:conic-gradient(#93c5fd 0deg 180deg, #c4b5fd 180deg 270deg, #86efac 270deg 315deg, #fcd34d 315deg 360deg);
  position:relative; margin:0 auto;
}
.donut::after {
  content:""; position:absolute; inset:24px; background:rgba(255,255,255,.98);
  border-radius:50%; box-shadow:inset 0 0 0 1px var(--line);
}
.legend { display:grid; gap:12px; }
.legend-item { display:grid; grid-template-columns:12px minmax(0,1fr) auto; gap:12px; align-items:center; }
.swatch { width:12px; height:12px; border-radius:999px; }
.legend-label { font-weight:700; color:#334155; }
.legend-pct { color:#64748b; font-weight:700; font-variant-numeric:tabular-nums; }

.projects-head {
  display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px;
}
.projects-head h2 { margin:0; font-size:1.12rem; }
.sort-note {
  color:#64748b; font-size:.86rem; font-weight:700;
  background:#f1f5f9; border:1px solid #e2e8f0; padding:8px 12px; border-radius:999px;
}
.cards { display:grid; gap:16px; grid-template-columns:repeat(2,minmax(0,1fr)); }
.card { padding:18px 18px 16px; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
.card-title {
  font-size:1rem; font-weight:800; line-height:1.35; letter-spacing:-.02em; margin:0;
  word-break:break-word;
}
.role-pill {
  flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center;
  padding:8px 12px; border-radius:999px; font-size:.82rem; font-weight:800; letter-spacing:.02em;
  border:1px solid transparent;
}
.role-Translation { background:#eaf2ff; color:#2453b6; border-color:#cfe0ff; }
.role-Proofreading { background:#f2ebff; color:#6d28d9; border-color:#e0d2ff; }
.role-MTPE { background:#fff3df; color:#b45309; border-color:#fde1b2; }
.role-LQA { background:#e9f9ef; color:#15803d; border-color:#bde8cc; }
.role-default { background:#f3f4f6; color:#4b5563; border-color:#e5e7eb; }

.meta {
  display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; padding-bottom:14px; border-bottom:1px solid #e9eef5;
}
.meta-chip {
  display:inline-flex; align-items:center; gap:7px; padding:8px 10px; border-radius:12px;
  background:#f8fafc; border:1px solid #e4ebf3; color:#475569; font-size:.84rem; font-weight:700;
}
.category {
  margin-top:14px; color:#334155; line-height:1.5; font-size:.95rem;
  padding:12px 13px; background:#f8fafc; border:1px solid #e7edf5; border-radius:14px;
}
.date-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-top:14px; }
.date-box { background:#fff; border:1px solid #e5edf5; border-radius:14px; padding:12px; }
.date-label { color:var(--muted); font-size:.73rem; text-transform:uppercase; letter-spacing:.08em; font-weight:800; margin-bottom:6px; }
.date-value { font-weight:700; color:#334155; font-size:.93rem; }
.file-toggle { margin-top:14px; border:none; background:transparent; color:#2563eb; font-weight:800; cursor:pointer; padding:0; font-size:.92rem; }
.file-list { margin-top:12px; display:none; padding-top:12px; border-top:1px dashed #d7e3f2; }
.file-list.open { display:block; }
.file-list ul { margin:0; padding-left:18px; color:#475569; line-height:1.55; }

.empty {
  padding:30px; text-align:center; color:#64748b; font-weight:700;
}

@media (max-width: 1100px) {
  .hero-card {
  position:relative;
  overflow:hidden;
  padding:26px 32px;
  display:grid;
  grid-template-columns:minmax(0,1fr) max-content;
  gap:18px;
  align-items:center;
  isolation:isolate;
}
  .hero-aside {
    min-height:auto;
    justify-content:flex-start;
  }
  .hero-badges {
    justify-content:flex-start;
    max-width:none;
    padding-top:0;
  }
  .kpis, .two-up, .cards { grid-template-columns:1fr 1fr; }
  .two-up { grid-template-columns:1fr; }
}
.year-select-wrap { display:flex; align-items:center; gap:12px; margin-top:16px; }
.year-select-label { font-size:13px; font-weight:700; color:#64748b; letter-spacing:.02em; }
.year-select { appearance:none; -webkit-appearance:none; -moz-appearance:none; background:#fff; border:1px solid #d6deeb; color:#0f172a; border-radius:12px; padding:10px 38px 10px 14px; font:600 14px/1.2 Inter, system-ui, sans-serif; box-shadow:0 1px 2px rgba(15,23,42,.04); background-image:linear-gradient(45deg, transparent 50%, #64748b 50%), linear-gradient(135deg, #64748b 50%, transparent 50%), linear-gradient(to right, transparent, transparent); background-position:calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px), 100% 0; background-size:6px 6px, 6px 6px, 2.5em 100%; background-repeat:no-repeat; min-width:120px; }
.year-select:focus { outline:none; border-color:#94a3b8; box-shadow:0 0 0 4px rgba(148,163,184,.18); }
@media (max-width: 780px) {

  .hero-card{ grid-template-columns:1fr; gap:18px; }
  .hero-aside, .hero-badges{
    justify-content:start;
    grid-template-columns:max-content max-content;
  }
  .email-row{ flex-wrap:wrap; }
  .copy-badge{
    position:static;
    left:auto;
    top:auto;
    margin-top:8px;
    transform:none;
  }
  .copy-badge.show{
    transform:none;
  }
  .copy-badge::after{
    display:none;
  }
  .container { width:min(100% - 20px, 1320px); }
  .hero-card {
  position:relative;
  overflow:hidden;
  padding:26px 32px;
  display:grid;
  grid-template-columns:minmax(0,1fr) max-content;
  gap:18px;
  align-items:center;
  isolation:isolate;
}
  .hero-badge { width:100%; justify-content:flex-start; }
  .contact-pill { width:100%; }
  .kpis, .cards { grid-template-columns:1fr; }
  .date-grid { grid-template-columns:1fr; }
  .donut-row { grid-template-columns:1fr; }
  .projects-head { align-items:flex-start; flex-direction:column; }
  .year-select-wrap { width:100%; }
  .year-select { width:100%; }
  .volume-row { grid-template-columns:56px minmax(0,1fr) 82px; }
}

#backToTop {
  position:fixed; right:24px; bottom:24px; z-index:1000;
  width:52px; height:52px; border:none; border-radius:999px;
  background:linear-gradient(180deg, #4f8cff, #3b82f6);
  color:#fff; font-size:18px; font-weight:800; line-height:1;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 14px 28px rgba(59,130,246,.28);
  opacity:0; visibility:hidden; transform:translateY(8px);
  transition:opacity .2s ease, transform .2s ease, visibility .2s ease, box-shadow .2s ease;
}
#backToTop:hover { transform:translateY(4px); box-shadow:0 16px 30px rgba(59,130,246,.34); }
#backToTop.show { opacity:1; visibility:visible; transform:translateY(0); }

function copyEmail(button) {
  const email = "kanemitsu.hiroshi@gmail.com";
  const badge = document.getElementById("copiedBadge");
  if (!navigator.clipboard) {
    const temp = document.createElement("textarea");
    temp.value = email;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  } else {
    navigator.clipboard.writeText(email).catch(() => {});
  }
  if (button) {
    button.classList.add("copied");
    setTimeout(() => button.classList.remove("copied"), 1200);
  }
  if (badge) {
    badge.classList.add("show");
    clearTimeout(window.__copiedBadgeTimer);
    window.__copiedBadgeTimer = setTimeout(() => {
      badge.classList.remove("show");
    }, 1200);
  }
}

const years = ["All", ...Array.from(new Set(rows.map(r => r.sheet))).sort((a,b) => Number(b)-Number(a))];
let activeYear = "All";

function fmtNum(n) {
  return new Intl.NumberFormat("en-US").format(Math.round(n || 0));
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}
function groupCategory(label) {
  const s = (label || "").trim();
  const low = s.toLowerCase();
  if (low.includes("clinical trial") || low.includes("clical trial") || low.includes("clinical trials") || low.includes("medical clinical trial")) return "Medical/Clinical Trial";
  if (s === "General" || s === "Genreal" || s === "Marketing") return "General";
  if (low.startsWith("medical")) return "Medical/Other";
  return s || "Other";
}
function monthKey(iso) { return iso ? iso.slice(0,7) : ""; }

function getActiveRows() {
  return activeYear === "All" ? rows.slice() : rows.filter(r => r.sheet === activeYear);
}

function renderButtons() {
  const select = document.getElementById("yearSelect");
  if (!select.dataset.ready) {
    select.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
    select.addEventListener("change", () => {
      activeYear = select.value;
      renderAll();
    });
    select.dataset.ready = "1";
  }
  select.value = activeYear;
}

function computeMonthlyAverage(active) {
  const monthSet = new Set(active.map(r => monthKey(r.completionDate || r.startDate || r.offeredDate)).filter(Boolean));
  if (!monthSet.size) return 0;
  return active.reduce((sum, r) => sum + (r.words || 0), 0) / monthSet.size;
}

function renderKPIs(active) {
  const totalRecords = active.length;
  const totalWords = active.reduce((sum, r) => sum + (r.words || 0), 0);
  const monthlyAvg = computeMonthlyAverage(active);
  const totalFiles = active.reduce((sum, r) => sum + ((r.workFiles && r.workFiles.length) ? r.workFiles.length : (r.workFile ? 1 : 0)), 0);
  const uniqueProjects = new Set(active.map(r => r.pjName).filter(Boolean)).size;

  const items = [
    { label:"Total Records", value:fmtNum(totalRecords), sub:`${fmtNum(uniqueProjects)} unique projects` },
    { label:"Total Words", value:fmtNum(totalWords), sub:"" },
    { label:"Monthly Average Words", value:fmtNum(monthlyAvg), sub:"" },
    { label:"Total Files", value:fmtNum(totalFiles), sub:"" },
  ];
  document.getElementById("kpiGrid").innerHTML = items.map(item => `
    <div class="surface kpi">
      <div>
        <div class="kpi-label">${item.label}</div>
        <div class="kpi-value">${item.value}</div>
      </div>
      <div class="kpi-sub">${item.sub}</div>
    </div>
  `).join("");
}

function renderVolume(active) {
  const chart = document.getElementById("volumeChart");
  const title = document.getElementById("volumeTitle");
  const sub = document.getElementById("volumeSub");

  let items = [];
  if (activeYear === "All") {
    title.textContent = "Yearly Volume";
    sub.textContent = "";
    const yearMap = new Map();
    ["2023","2024","2025","2026"].forEach(y => yearMap.set(y, 0));
    active.forEach(r => yearMap.set(r.sheet, (yearMap.get(r.sheet) || 0) + (r.words || 0)));
    items = Array.from(yearMap, ([label, value]) => ({label, value}));
  } else {
    title.textContent = "Monthly Volume";
    sub.textContent = "";
    const labels = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const values = Array(12).fill(0);
    active.forEach(r => {
      const iso = r.completionDate || r.startDate || r.offeredDate;
      if (!iso) return;
      const d = new Date(iso + "T00:00:00");
      values[d.getMonth()] += r.words || 0;
    });
    items = labels.map((label, i) => ({label, value: values[i]}));
  }

  const max = Math.max(...items.map(x => x.value), 1);
  chart.innerHTML = `<div class="volume-list">${items.map(item => `
    <div class="volume-row">
      <div class="volume-label">${item.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(item.value / max) * 100}%"></div></div>
      <div class="volume-value">${fmtNum(item.value)}</div>
    </div>
  `).join("")}</div>`;
}

function roundedPercents(values) {
  const total = values.reduce((a,b)=>a+b,0) || 1;
  const exact = values.map(v => v / total * 100);
  const floors = exact.map(v => Math.floor(v*10)/10);
  let remainder = Math.round((100 - floors.reduce((a,b)=>a+b,0))*10)/10;
  const indexed = exact.map((v,i)=>({i, frac: v - floors[i]})).sort((a,b)=>b.frac-a.frac);
  const out = floors.slice();
  let idx = 0;
  while (remainder > 0.0001 && idx < indexed.length) {
    out[indexed[idx].i] = Math.round((out[indexed[idx].i] + 0.1)*10)/10;
    remainder = Math.round((remainder - 0.1)*10)/10;
    idx++;
    if (idx >= indexed.length) idx = 0;
  }
  return out;
}

function renderBreakdown(active) {
  const colors = ["#93c5fd","#c4b5fd","#86efac","#fcd34d","#fca5a5","#67e8f9"];
  const grouped = new Map();
  active.forEach(r => {
    const key = groupCategory(r.category);
    grouped.set(key, (grouped.get(key) || 0) + 1);
  });
  const entries = Array.from(grouped.entries()).sort((a,b)=>b[1]-a[1]);
  const values = entries.map(x => x[1]);
  const pcts = roundedPercents(values);
  let current = 0;
  const gradient = entries.map((entry, i) => {
    const start = current;
    const end = current + (values[i] / (values.reduce((a,b)=>a+b,0) || 1)) * 360;
    current = end;
    return `${colors[i % colors.length]} ${start}deg ${end}deg`;
  }).join(", ");

  document.getElementById("categoryBreakdown").innerHTML = `
    <div class="breakdown-wrap">
      <div class="donut-row">
        <div class="donut" style="background:conic-gradient(${gradient})">
          
        </div>
        <div class="legend">
          ${entries.map((entry, i) => `
            <div class="legend-item">
              <div class="swatch" style="background:${colors[i % colors.length]}"></div>
              <div class="legend-label">${entry[0] === "Marketing/Public Relations (SIA)" ? "Marketing/Public Relations" : entry[0]}</div>
              <div class="legend-pct">${pcts[i].toFixed(1)}%</div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  return (str || "").replace(/[&<>"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[s]));
}

          <div class="meta-chip">${escapeHtml(r.sheet)}</div>
        </div>

        <div class="category">${escapeHtml(r.category)}</div>

        <div class="date-grid">
          <div class="date-box">
            <div class="date-label">Offered Date</div>
            <div class="date-value">${fmtDate(r.offeredDate)}</div>
          </div>
          <div class="date-box">
            <div class="date-label">Start Date</div>
            <div class="date-value">${fmtDate(r.startDate)}</div>
          </div>
          <div class="date-box">
            <div class="date-label">Completion Date</div>
            <div class="date-value">${fmtDate(r.completionDate)}</div>
          </div>
        </div>

        ${filesCount ? `<button class="file-toggle" data-open="0" data-target="files-${idx}" data-count="${filesCount}">Show work files (${fmtNum(filesCount)})</button><div class="file-list" id="files-${idx}"><ul>${(r.workFiles || []).map(file => `<li>${escapeHtml(file)}</li>`).join("")}</ul></div>` : ''}
      </article>
    `;
  }).join("")}</div>`;

  wrap.querySelectorAll('.file-toggle').forEach(btn => btn.addEventListener('click', () => {
    const target = document.getElementById(btn.dataset.target);
    const open = target.classList.toggle('open');
    btn.textContent = open ? 'Hide work files' : `Show work files (${btn.dataset.count})`;
  }));
}

function renderAll() {
  renderButtons();
  const active = getActiveRows();
  renderKPIs(active);
  renderVolume(active);
  renderBreakdown(active);
  renderProjects(active);
}

renderAll();


const backToTopBtn = document.getElementById("backToTop");
function toggleBackToTop() {
  if (!backToTopBtn) return;
  if (window.scrollY > 280) {
    backToTopBtn.classList.add("show");
  } else {
    backToTopBtn.classList.remove("show");
  }
}
if (backToTopBtn) {
  window.addEventListener("scroll", toggleBackToTop, { passive: true });
  backToTopBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  toggleBackToTop();
}

</script>
</body>
</html>
