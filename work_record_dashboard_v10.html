<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work Record Dashboard</title>

<style>
:root {
  --bg:#f8fafc;
  --bg2:#eef4f8;
  --panel:rgba(255,255,255,.97);
  --line:#dbe4ee;
  --text:#1f2937;
  --muted:#667085;
  --accent:#3b82f6;
  --shadow:0 18px 40px rgba(15,23,42,.06);
  --radius:24px;
}

* { box-sizing:border-box; }

html,body {
  margin:0;
  padding:0;
}

body {
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.06), transparent 24%),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 55%, var(--bg2) 100%);
}

.container {
  width:min(1320px, calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 56px;
}

.surface {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--shadow);
}

.hero {
  position:sticky;
  top:0;
  z-index:20;
  padding:4px 0 18px;
  backdrop-filter:blur(14px);
  background:linear-gradient(
    180deg,
    rgba(248,250,252,.96),
    rgba(248,250,252,.78) 80%,
    rgba(248,250,252,0)
  );
}

.hero-card {
  padding:22px 24px;
}

h1 {
  margin:0;
  font-size:clamp(1.75rem,2.5vw,2.55rem);
  letter-spacing:-.03em;
}

.section {
  margin-top:20px;
}

.grid {
  display:grid;
  gap:18px;
}

.kpis {
  grid-template-columns:repeat(4,minmax(0,1fr));
}

.kpi {
  padding:22px;
  min-height:126px;
}

.kpi-label {
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.09em;
  font-size:.72rem;
  font-weight:800;
}

.kpi-value {
  font-size:clamp(1.85rem,3vw,2.35rem);
  font-weight:800;
  margin-top:10px;
}

.kpi-sub {
  color:var(--muted);
  font-size:.92rem;
  margin-top:4px;
}

.two-up {
  grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);
}

.panel {
  padding:22px;
}

.year-select-wrap {
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:16px;
}

.year-select {
  appearance:none;
  background:#fff;
  border:1px solid #d6deeb;
  color:#0f172a;
  border-radius:12px;
  padding:10px 38px 10px 14px;
  font-weight:600;
}

@media (max-width:780px) {
  .kpis {
    grid-template-columns:1fr;
  }

  .two-up {
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<div class="container">

<div class="hero">
<div class="surface hero-card">

<h1>Work Record Dashboard</h1>

<div class="year-select-wrap">
<label for="yearSelect">Year</label>
<select id="yearSelect" class="year-select"></select>
</div>

</div>
</div>

<section class="section grid kpis" id="kpiGrid"></section>

<section class="section grid two-up">

<div class="surface panel">
<h2>Yearly Volume</h2>
<div id="volumeChart"></div>
</div>

<div class="surface panel">
<h2>Category Breakdown</h2>
<div id="categoryBreakdown"></div>
</div>

</section>

<section class="section surface panel">

<h2>Projects</h2>

<div id="projects"></div>

</section>

</div>

<script>

/////////////////////////////////////////////////////////
// GitHub Actions がここを書き換えます
/////////////////////////////////////////////////////////

const rows = [];

/////////////////////////////////////////////////////////
// dashboard logic
/////////////////////////////////////////////////////////

function groupBy(arr,key){
  return arr.reduce((acc,item)=>{
    const val=item[key];
    (acc[val]=acc[val]||[]).push(item);
    return acc;
  },{});
}

function getYears(data){
  const years=[...new Set(data.map(r=>r.sortDate?.slice(0,4)))];
  return years.sort();
}

function filterYear(data,year){
  if(year==="All") return data;
  return data.filter(r=>r.sortDate?.startsWith(year));
}

function renderYearSelector(data){

  const years=getYears(data);

  const select=document.getElementById("yearSelect");

  select.innerHTML="";

  ["All",...years].forEach(y=>{
    const opt=document.createElement("option");
    opt.value=y;
    opt.textContent=y;
    select.appendChild(opt);
  });

  select.addEventListener("change",()=>{
    renderDashboard(select.value);
  });

}

function sumWords(data){
  return data.reduce((sum,r)=>sum+(Number(r.words)||0),0);
}

function renderKPIs(data){

  const container=document.getElementById("kpiGrid");

  const totalWords=sumWords(data);

  const projects=new Set(data.map(r=>r.pjName));

  container.innerHTML=`

<div class="surface kpi">
<div class="kpi-label">TOTAL RECORDS</div>
<div class="kpi-value">${data.length}</div>
<div class="kpi-sub">${projects.size} unique projects</div>
</div>

<div class="surface kpi">
<div class="kpi-label">TOTAL WORDS</div>
<div class="kpi-value">${totalWords.toLocaleString()}</div>
</div>

<div class="surface kpi">
<div class="kpi-label">MONTHLY AVG WORDS</div>
<div class="kpi-value">${Math.round(totalWords/12).toLocaleString()}</div>
</div>

<div class="surface kpi">
<div class="kpi-label">TOTAL FILES</div>
<div class="kpi-value">${data.reduce((sum,r)=>sum+(r.workFiles?.length||1),0)}</div>
</div>

`;

}

function renderDashboard(year){

  const filtered=filterYear(rows,year);

  renderKPIs(filtered);

}

renderYearSelector(rows);

renderDashboard("All");

</script>

</body>
</html>
